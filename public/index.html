<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Simulación</title>
    <style>
        /* Modern Glassmorphic Loading screen */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #0f0f1b);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 90%;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-container" id="loading-ui">
        <div class="spinner"></div>
        <h2>Inicializando...</h2>
        <p>Cargando la calculadora de simulación en WebAssembly</p>
    </div>

    <!-- WASI Shim & Haskell WASM Loader -->
    <script type="module">
        import { WASI, Fd } from 'https://cdn.jsdelivr.net/npm/@bjorn3/browser_wasi_shim@0.3.0/+esm';
        import ffiBuilder from './calculadora-simulacion.js';

        // 1. Initialize Miso global namespace (Crucial for JSFFI calls)
        globalThis.miso = {};

        // 2. Redirect stdout/stderr prints to the browser developer console
        class ConsoleStdout extends Fd {
            constructor() {
                super();
                this.decoder = new TextDecoder("utf-8");
            }
            write(data) {
                console.log(this.decoder.decode(data).trim());
                return data.length;
            }
        }

        class ConsoleStderr extends Fd {
            constructor() {
                super();
                this.decoder = new TextDecoder("utf-8");
            }
            write(data) {
                console.error(this.decoder.decode(data).trim());
                return data.length;
            }
        }

        const args = [];
        const env = [];
        const fds = [
            new Fd(),             // stdin
            new ConsoleStdout(),  // stdout
            new ConsoleStderr(),  // stderr
        ];

        async function run() {
            try {
                // Initialize WASI
                const wasi = new WASI(args, env, fds);

                // Setup the JSFFI imports object and knot-tying exports reference
                const ffi_exports = {};
                const ffi_imports = ffiBuilder(ffi_exports);

                // Fetch and instantiate the WASM module
                const response = await fetch('./calculadora-simulacion.wasm');
                const wasmBytes = await response.arrayBuffer();

                const { instance } = await WebAssembly.instantiate(wasmBytes, {
                    wasi_snapshot_preview1: wasi.wasiImport,
                    ghc_wasm_jsffi: ffi_imports,
                });

                // Complete the knot-tying step
                Object.assign(ffi_exports, instance.exports);

                // Bind the WASM instance to the WASI shim so it can access the memory (this automatically calls _initialize)
                wasi.initialize(instance);

                // Remove the loading UI before starting the Miso app
                const loadingUI = document.getElementById("loading-ui");
                if (loadingUI) {
                    loadingUI.remove();
                }

                // Run the app's main entry point (Miso will mount and render the view, replacing the body content)
                instance.exports.hs_start();
            } catch (err) {
                console.error("Error al cargar la aplicación WASM:", err);
                const loadingText = document.querySelector("#loading-ui p");
                if (loadingText) {
                    loadingText.innerText = "Error al iniciar la aplicación. Abre la consola de desarrollador para más detalles.";
                    loadingText.style.color = "#ef4444";
                }
            }
        }

        run();
    </script>
</body>
</html>
